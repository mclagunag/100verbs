<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Verbos | Español</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCFAF2;       
            --text: #34231D;     
            --accent1: #A66F5D;  
            --accent2: #729B79;  
            --light1: #D6BFFF;   
            --light2: #E6E670;   
            --white: #FFFFFF;
            --border: rgba(52, 35, 29, 0.1);
        }
        body.dark-mode {
            --bg: #1A1210; 
            --text: #FCFAF2; 
            --white: #2C1E19;
            --border: rgba(252, 250, 242, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 700px; width: 100%; }
        
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .icon-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; transition: transform 0.2s; }
        .icon-btn:hover { transform: scale(1.1); }

        h1 { font-weight: 300; text-align: center; margin-bottom: 30px; font-size: 28px; }

        .tabs { display: flex; justify-content: center; background: var(--white); border-radius: 12px; padding: 5px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text); font-family: 'Inter'; font-weight: 500; font-size: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent1); color: var(--bg); }

        .view { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* VIEW 1: LISTA */
        .list-controls { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .list-controls button { background: var(--white); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Inter'; color: var(--text); transition: 0.2s;}
        .list-controls button:hover { border-color: var(--accent1); color: var(--accent1); }
        
        .list-row { background: var(--white); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        .row-header { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; gap: 15px; }
        .row-num { font-size: 14px; color: var(--accent1); font-weight: 600; width: 25px; }
        .row-verb { font-weight: 600; font-size: 18px; flex: 1; display: flex; align-items: center; gap: 10px; }
        
        .tap-reveal { background: var(--bg); border: 1px dashed var(--accent1); padding: 6px 15px; border-radius: 20px; font-size: 14px; color: var(--accent1); font-style: italic; transition: 0.3s; text-align: center; min-width: 150px; }
        .tap-reveal.revealed { background: transparent; border: none; font-style: normal; color: var(--text); }
        .chevron { transition: transform 0.3s; color: var(--accent1); }
        .list-row.open .chevron { transform: rotate(180deg); }
        
        .row-content { display: none; padding: 20px; background: var(--bg); border-top: 1px solid var(--border); font-size: 14px; }
        .list-row.open .row-content { display: block; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .conj-col h4 { margin: 0 0 10px 0; color: var(--accent2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;}
        .c-line { margin-bottom: 6px; display: flex; justify-content: space-between; }
        .c-pron { opacity: 0.6; }

        /* VIEW 2: FLASHCARDS */
        .card-box { perspective: 1000px; height: 350px; margin: 0 auto; max-width: 400px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card.flip { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--white); border-radius: 20px; padding: 30px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        .back { transform: rotateY(180deg); }
        .v-main { font-size: 48px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 15px; }
        .v-trans { font-size: 20px; color: var(--accent1); line-height: 1.8; }

        /* VIEW 3: EJERCICIOS */
        .ex-area { background: var(--white); padding: 40px; border-radius: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Inter'; font-size: 16px;}
        input { width: 90%; padding: 15px; border: none; border-bottom: 2px solid var(--accent1); background: transparent; color: var(--text); font-size: 20px; text-align: center; outline: none; margin: 20px 0; font-family: 'Inter';}
        .feed { font-weight: 600; margin-top: 15px; height: 20px; }

        .nav-btns { display: flex; justify-content: space-between; max-width: 400px; margin: 20px auto 0 auto; gap: 10px; }
        .btn-primary { background: var(--accent1); color: var(--bg); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-family: 'Inter'; flex: 1; transition: 0.2s; font-weight: 500;}
        .btn-primary:hover { opacity: 0.9; }
        .btn-sec { background: var(--text); color: var(--bg); border: none; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="icon-btn" onclick="toggleDark()" title="Modo Día/Noche">🌙</button>
    </div>

    <h1>Verbos Esenciales</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('list')">Lista</button>
        <button class="tab-btn" onclick="switchTab('flash')">Flashcards</button>
        <button class="tab-btn" onclick="switchTab('ex')">Ejercicios</button>
    </div>

    <div id="view-list" class="view active">
        <div class="list-controls">
            <button onclick="revealAll()">👁️ Revelar Todo</button>
            <button onclick="hideAll()">🙈 Ocultar Todo</button>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="view-flash" class="view">
        <div class="card-box" onclick="this.querySelector('.card').classList.toggle('flip')">
            <div class="card">
                <div class="front">
                    <div class="v-main">
                        <span id="fc-v">Verbo</span>
                        <button class="icon-btn" onclick="playAudio(document.getElementById('fc-v').innerText, event)">🔊</button>
                    </div>
                    <p style="color:#999; font-size:14px; margin-top:20px;">Toca para revelar</p>
                </div>
                <div class="back">
                    <div class="v-trans" id="fc-t">Traducción</div>
                </div>
            </div>
        </div>
        <div class="nav-btns">
            <button class="btn-primary" onclick="prevFC()">⬅ Anterior</button>
            <button class="btn-sec" onclick="shuffleFC()" title="Aleatorio">🔀</button>
            <button class="btn-primary" onclick="nextFC()">Siguiente ➡</button>
        </div>
    </div>

    <div id="view-ex" class="view">
        <div class="ex-area">
            <select id="ex-tense" onchange="updateEx()">
                <option value="pr">Presente</option>
                <option value="pa">Pasado (Pretérito)</option>
                <option value="fu">Futuro</option>
            </select>
            <div class="v-main" style="justify-content:center; font-size:24px;">
                <span id="ex-p"></span>
            </div>
            <input type="text" id="ex-in" autocomplete="off" placeholder="Escribe aquí...">
            <div id="ex-f" class="feed"></div>
            <button class="btn-primary" style="width:100%; margin-top:15px;" onclick="checkEx()">Comprobar (Enter)</button>
        </div>
    </div>
</div>

<script>

    { i:"Esperar", t:"PT: Esperar<br>EN: To wait/hope<br>FR: Attendre", pr:["espero","esperas","espera","esperamos","esperan"], pa:["esperé","esperaste","esperó","esperamos","esperaron"], fu:["esperaré","esperarás","esperará","esperaremos","esperarán"] },
    { i:"Entender", t:"PT: Entender<br>EN: To understand<br>FR: Comprendre", pr:["entiendo","entiendes","entiende","entendemos","entienden"], pa:["entendí","entendiste","entendió","entendimos","entendieron"], fu:["entenderé","entenderás","entenderá","entenderemos","entenderán"] },

const pron = ["Yo", "Tú", "Él/Ella/Ud.", "Nosotros", "Ellos/Uds."];
let currentMode = 'list';
let fcIdx = 0, exIdx = 0, exPIdx = 0, isCorrect = false;

function switchTab(tab) {
    currentMode = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById(`view-${tab}`).classList.add('active');
    
    if(tab === 'flash') updateFC();
    if(tab === 'ex') { updateEx(); document.getElementById('ex-in').focus(); }
}

function toggleDark() { document.body.classList.toggle('dark-mode'); }
function playAudio(text, e) {
    if(e) e.stopPropagation();
    let utt = new SpeechSynthesisUtterance(text); utt.lang = 'es-CO'; window.speechSynthesis.speak(utt);
}

function buildList() {
    const cont = document.getElementById('list-container');
    let html = '';
    verbs.forEach((v, i) => {
        let cPr='', cPa='', cFu='';
        pron.forEach((p, j) => {
            cPr += `<div class="c-line"><span class="c-pron">${p}</span> <span>${v.pr[j]}</span></div>`;
            cPa += `<div class="c-line"><span class="c-pron">${p}</span> <span>${v.pa[j]}</span></div>`;
            cFu += `<div class="c-line"><span class="c-pron">${p}</span> <span>${v.fu[j]}</span></div>`;
        });
        
        let transSingleLine = v.t.replace(/<br>/g, " | ");

        html += `
        <div class="list-row" id="row-${i}">
            <div class="row-header" onclick="toggleRow(${i}, event)">
                <span class="row-num">${i+1}.</span>
                <div class="row-verb">
                    <button class="icon-btn" style="font-size:18px;" onclick="playAudio('${v.i}', event)">🔊</button>
                    ${v.i}
                </div>
                <div class="tap-reveal" data-trans="${transSingleLine}" onclick="revealMask(this, event)">tocar para traducir</div>
                <span class="chevron">▼</span>
            </div>
            <div class="row-content">
                <div class="grid-3">
                    <div class="conj-col"><h4>Presente</h4>${cPr}</div>
                    <div class="conj-col"><h4>Pret. Perfecto</h4>${cPa}</div>
                    <div class="conj-col"><h4>Futuro</h4>${cFu}</div>
                </div>
            </div>
        </div>`;
    });
    cont.innerHTML = html;
}

function toggleRow(i, e) { document.getElementById(`row-${i}`).classList.toggle('open'); }
function revealMask(el, e) {
    e.stopPropagation();
    if(el.classList.contains('revealed')) { el.classList.remove('revealed'); el.innerHTML = "tocar para traducir"; } 
    else { el.classList.add('revealed'); el.innerHTML = el.getAttribute('data-trans'); }
}
function revealAll() { document.querySelectorAll('.tap-reveal').forEach(el => { el.classList.add('revealed'); el.innerHTML = el.getAttribute('data-trans'); }); }
function hideAll() { document.querySelectorAll('.tap-reveal').forEach(el => { el.classList.remove('revealed'); el.innerHTML = "tocar para traducir"; }); }

function updateFC() {
    document.querySelector('.card').classList.remove('flip');
    document.getElementById('fc-v').innerText = verbs[fcIdx].i;
    document.getElementById('fc-t').innerHTML = verbs[fcIdx].t;
}
function nextFC() { fcIdx++; if(fcIdx >= verbs.length) fcIdx=0; updateFC(); }
function prevFC() { fcIdx--; if(fcIdx < 0) fcIdx=verbs.length-1; updateFC(); }
function shuffleFC() { fcIdx = Math.floor(Math.random() * verbs.length); updateFC(); }

function updateEx() {
    isCorrect = false;
    document.getElementById('ex-f').innerText = ""; document.getElementById('ex-in').value = "";
    document.getElementById('ex-p').innerText = `${pron[exPIdx]} (${verbs[exIdx].i})`;
}
function checkEx() {
    if(isCorrect) { nextEx(); return; }
    const tn = document.getElementById('ex-tense').value;
    const u = document.getElementById('ex-in').value.toLowerCase().trim();
    const c = verbs[exIdx][tn][exPIdx];
    const f = document.getElementById('ex-f');
    if(u===c) { f.innerText="¡Correcto!"; f.style.color="var(--accent2)"; isCorrect = true; setTimeout(()=>{ if(isCorrect) nextEx(); }, 1000); } 
    else { f.innerText=`Incorrecto. Respuesta: ${c}`; f.style.color="var(--accent1)"; }
}
function nextEx() {
    exPIdx++; if(exPIdx >= pron.length) { exPIdx=0; exIdx = Math.floor(Math.random() * verbs.length); }
    updateEx();
}

document.addEventListener('keydown', (e) => {
    if (currentMode === 'ex' && e.target.tagName === 'INPUT') { if (e.key === 'Enter') checkEx(); return; }
    if (currentMode === 'flash') {
        if (e.key === 'ArrowRight') nextFC();
        if (e.key === 'ArrowLeft') prevFC();
        if (e.key === ' ') { e.preventDefault(); document.querySelector('.card').classList.toggle('flip'); }
    }
});

buildList();
updateFC();
</script>
</body>
</html>
