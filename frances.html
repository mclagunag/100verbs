<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maîtrise des Verbes | Français</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{--a:#A66F5D;--d:#34231D;--b:#FCFAF2;--w:#FFF}
        body{font-family:'Inter',sans-serif;background:var(--b);color:var(--d);margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px}
        .container{max-width:600px;width:100%;text-align:center}
        h1{font-weight:300;margin-bottom:40px}
        .nav{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
        button,select{font-family:'Inter';padding:12px 20px;border-radius:8px;border:1px solid var(--a);background:transparent;color:var(--d);cursor:pointer;font-size:14px;transition:.3s}
        button:hover,.act{background:var(--a);color:var(--b)}
        .card-box{perspective:1000px;height:380px;margin-bottom:30px;cursor:pointer}
        .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s}
        .card.flip{transform:rotateY(180deg)}
        .front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--w);border-radius:20px;padding:30px;box-sizing:border-box;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        .back{transform:rotateY(180deg);align-items:flex-start}
        .v-main{font-size:42px;font-weight:600;margin:0}
        .trans{color:var(--a);font-size:14px;margin-top:15px}
        .c-item{margin:8px 0;font-size:18px;width:100%;border-bottom:1px solid #eee;padding-bottom:4px;text-align:left;}
        .ex-area{background:var(--w);padding:40px;border-radius:20px;display:none;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        input{width:90%;padding:15px;border:none;border-bottom:2px solid var(--a);font-size:20px;text-align:center;outline:none;margin:20px 0;font-family:'Inter'}
        .feed{font-weight:600;margin-top:15px;height:20px}
        .foot{display:flex;justify-content:space-between;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>Pratique des Verbes</h1>
    <div class="nav">
        <select id="tSelect" onchange="chTense()">
            <option value="pr">Présent</option>
            <option value="pa">Passé Composé</option>
            <option value="fu">Futur Simple</option>
        </select>
        <button id="bFlash" class="act" onclick="setMode('flash')">Flashcards</button>
        <button id="bEx" onclick="setMode('ex')">Exercices</button>
    </div>
    <div id="vFlash">
        <div class="card-box" onclick="this.querySelector('.card').classList.toggle('flip')">
            <div class="card">
                <div class="front">
                    <p class="v-main" id="fc-v">Verbo</p>
                    <div class="trans" id="fc-t">Traducción</div>
                </div>
                <div class="back" id="fc-c"></div>
            </div>
        </div>
    </div>
    <div id="vEx" class="ex-area">
        <p id="ex-p" style="font-size: 18px;"></p>
        <input type="text" id="ex-in" autocomplete="off" placeholder="Écrivez ici...">
        <div id="ex-f" class="feed"></div>
        <button onclick="check()" style="margin-top:10px;width:100%;background:var(--d);color:white;">Vérifier</button>
    </div>
    <div class="foot">
        <button onclick="prev()">Précédent</button>
        <button onclick="shuffle()" style="background: var(--d); color: white;">Aléatoir 🔀</button>
        <button onclick="next()">Suivant</button>
    </div>
</div>
<script>
const verbs = [
    { i:"Être", t:"ES: Ser/Estar | EN: To be | PT: Ser/Estar", pr:["suis","es","est","sommes","êtes","sont"], pa:["ai été","as été","a été","avons été","avez été","ont été"], fu:["serai","seras","sera","serons","serez","seront"] },
    { i:"Avoir", t:"ES: Tener | EN: To have | PT: Ter", pr:["ai","as","a","avons","avez","ont"], pa:["ai eu","as eu","a eu","avons eu","avez eu","ont eu"], fu:["aurai","auras","aura","aurons","aurez","auront"] },
    { i:"Aller", t:"ES: Ir | EN: To go | PT: Ir", pr:["vais","vas","va","allons","allez","vont"], pa:["suis allé(e)","es allé(e)","est allé(e)","sommes allé(e)s","êtes allé(e)s","sont allé(e)s"], fu:["irai","iras","ira","irons","irez","iront"] },
    { i:"Faire", t:"ES: Hacer | EN: To do/make | PT: Fazer", pr:["fais","fais","fait","faisons","faites","font"], pa:["ai fait","as fait","a fait","avons fait","avez fait","ont fait"], fu:["ferai","feras","fera","ferons","ferez","feront"] },
    { i:"Pouvoir", t:"ES: Poder | EN: To be able | PT: Poder", pr:["peux","peux","peut","pouvons","pouvez","peuvent"], pa:["ai pu","as pu","a pu","avons pu","avez pu","ont pu"], fu:["pourrai","pourras","pourra","pourrons","pourrez","pourront"] },
    { i:"Dire", t:"ES: Decir | EN: To say | PT: Dizer", pr:["dis","dis","dit","disons","dites","disent"], pa:["ai dit","as dit","a dit","avons dit","avez dit","ont dit"], fu:["dirai","diras","dira","dirons","direz","diront"] },
    { i:"Vouloir", t:"ES: Querer | EN: To want | PT: Querer", pr:["veux","veux","veut","voulons","voulez","veulent"], pa:["ai voulu","as voulu","a voulu","avons voulu","avez voulu","ont voulu"], fu:["voudrai","voudras","voudra","voudrons","voudrez","voudront"] },
    { i:"Voir", t:"ES: Ver | EN: To see | PT: Ver", pr:["vois","vois","voit","voyons","voyez","voient"], pa:["ai vu","as vu","a vu","avons vu","avez vu","ont vu"], fu:["verrai","verras","verra","verrons","verrez","verront"] },
    { i:"Savoir", t:"ES: Saber | EN: To know | PT: Saber", pr:["sais","sais","sait","savons","savez","savent"], pa:["ai su","as su","a su","avons su","avez su","ont su"], fu:["saurai","sauras","saura","saurons","saurez","sauront"] },
    { i:"Donner", t:"ES: Dar | EN: To give | PT: Dar", pr:["donne","donnes","donne","donnons","donnez","donnent"], pa:["ai donné","as donné","a donné","avons donné","avez donné","ont donné"], fu:["donnerai","donneras","donnera","donnerons","donnerez","donneront"] },
    { i:"Venir", t:"ES: Venir | EN: To come | PT: Vir", pr:["viens","viens","vient","venons","venez","viennent"], pa:["suis venu(e)","es venu(e)","est venu(e)","sommes venu(e)s","êtes venu(e)s","sont venu(e)s"], fu:["viendrai","viendras","viendra","viendrons","viendrez","viendront"] },
    { i:"Parler", t:"ES: Hablar | EN: To speak | PT: Falar", pr:["parle","parles","parle","parlons","parlez","parlent"], pa:["ai parlé","as parlé","a parlé","avons parlé","avez parlé","ont parlé"], fu:["parlerai","parleras","parlera","parlerons","parlerez","parleront"] },
    { i:"Manger", t:"ES: Comer | EN: To eat | PT: Comer", pr:["mange","manges","mange","mangeons","mangez","mangent"], pa:["ai mangé","as mangé","a mangé","avons mangé","avez mangé","ont mangé"], fu:["mangerai","mangeras","mangera","mangerons","mangerez","mangeront"] },
    { i:"Boire", t:"ES: Beber | EN: To drink | PT: Beber", pr:["bois","bois","boit","buvons","buvez","boivent"], pa:["ai bu","as bu","a bu","avons bu","avez bu","ont bu"], fu:["boirai","boiras","boira","boirons","boirez","boiront"] },
    { i:"Partir", t:"ES: Partir/Salir | EN: To leave | PT: Partir", pr:["pars","pars","part","partons","partez","partent"], pa:["suis parti(e)","es parti(e)","est parti(e)","sommes parti(e)s","êtes parti(e)s","sont parti(e)s"], fu:["partirai","partiras","partira","partirons","partirez","partiront"] },{ i:"Prendre", t:"ES: Tomar | EN: To take | PT: Tomar/Pegar", pr:["prends","prends","prend","prenons","prenez","prennent"], pa:["ai pris","as pris","a pris","avons pris","avez pris","ont pris"], fu:["prendrai","prendras","prendra","prendrons","prendrez","prendront"] },
    { i:"Croire", t:"ES: Creer | EN: To believe | PT: Crer/Acreditar", pr:["crois","crois","croit","croyons","croyez","croient"], pa:["ai cru","as cru","a cru","avons cru","avez cru","ont cru"], fu:["croirai","croiras","croira","croirons","croirez","croiront"] },
    { i:"Mettre", t:"ES: Poner | EN: To put | PT: Pôr/Colocar", pr:["mets","mets","met","mettons","mettez","mettent"], pa:["ai mis","as mis","a mis","avons mis","avez mis","ont mis"], fu:["mettrai","mettras","mettra","mettrons","mettrez","mettront"] },
    { i:"Devoir", t:"ES: Deber | EN: To have to | PT: Dever", pr:["dois","dois","doit","devons","devez","doivent"], pa:["ai dû","as dû","a dû","avons dû","avez dû","ont dû"], fu:["devrai","devras","devra","devrons","devrez","devront"] },
    { i:"Trouver", t:"ES: Encontrar | EN: To find | PT: Encontrar", pr:["trouve","trouves","trouve","trouvons","trouvez","trouvent"], pa:["ai trouvé","as trouvé","a trouvé","avons trouvé","avez trouvé","ont trouvé"], fu:["trouverai","trouveras","trouvera","trouverons","trouverez","trouveront"] },
    { i:"Passer", t:"ES: Pasar | EN: To pass | PT: Passar", pr:["passe","passes","passe","passons","passez","passent"], pa:["suis passé(e)","es passé(e)","est passé(e)","sommes passé(e)s","êtes passé(e)s","sont passé(e)s"], fu:["passerai","passeras","passera","passerons","passerez","passeront"] },
    { i:"Comprendre", t:"ES: Comprender | EN: To understand | PT: Compreender", pr:["comprends","comprends","comprend","comprenons","comprenez","comprennent"], pa:["ai compris","as compris","a compris","avons compris","avez compris","ont compris"], fu:["comprendrai","comprendras","comprendra","comprendrons","comprendrez","comprendront"] },
    { i:"Sortir", t:"ES: Salir | EN: To go out | PT: Sair", pr:["sors","sors","sort","sortons","sortez","sortent"], pa:["suis sorti(e)","es sorti(e)","est sorti(e)","sommes sorti(e)s","êtes sorti(e)s","sont sorti(e)s"], fu:["sortirai","sortiras","sortira","sortirons","sortirez","sortiront"] },
    { i:"Apprendre", t:"ES: Aprender | EN: To learn | PT: Aprender", pr:["apprends","apprends","apprend","apprenons","apprenez","apprennent"], pa:["ai appris","as appris","a appris","avons appris","avez appris","ont appris"], fu:["apprendrai","apprendras","apprendra","apprendrons","apprendrez","apprendront"] },
    { i:"Connaître", t:"ES: Conocer | EN: To know | PT: Conhecer", pr:["connais","connais","connaît","connaissons","connaissez","connaissent"], pa:["ai connu","as connu","a connu","avons connu","avez connu","ont connu"], fu:["connaîtrai","connaîtras","connaîtra","connaîtrons","connaîtrez","connaîtront"] },
    { i:"Arriver", t:"ES: Llegar | EN: To arrive | PT: Chegar", pr:["arrive","arrives","arrive","arrivons","arrivez","arrivent"], pa:["suis arrivé(e)","es arrivé(e)","est arrivé(e)","sommes arrivé(e)s","êtes arrivé(e)s","sont arrivé(e)s"], fu:["arriverai","arriveras","arrivera","arriverons","arriverez","arriveront"] },
    { i:"Attendre", t:"ES: Esperar | EN: To wait | PT: Esperar", pr:["attends","attends","attend","attendons","attendez","attendent"], pa:["ai attendu","as attendu","a attendu","avons attendu","avez attendu","ont attendu"], fu:["attendrai","attendras","attendra","attendrons","attendrez","attendront"] },
    { i:"Demander", t:"ES: Preguntar/Pedir | EN: To ask | PT: Perguntar/Pedir", pr:["demande","demandes","demande","demandons","demandez","demandent"], pa:["ai demandé","as demandé","a demandé","avons demandé","avez demandé","ont demandé"], fu:["demanderai","demanderas","demandera","demanderons","demanderez","demanderont"] },
    { i:"Aimer", t:"ES: Amar/Gustar | EN: To love/like | PT: Amar/Gostar", pr:["aime","aimes","aime","aimons","aimez","aiment"], pa:["ai aimé","as aimé","a aimé","avons aimé","avez aimé","ont aimé"], fu:["aimerai","aimeras","aimera","aimerons","aimerez","aimeront"] },
    { i:"Jouer", t:"ES: Jugar | EN: To play | PT: Jogar", pr:["joue","joues","joue","jouons","jouez","jouent"], pa:["ai joué","as joué","a joué","avons joué","avez joué","ont joué"], fu:["jouerai","joueras","jouera","jouerons","jouerez","joueront"] },
    { i:"Sentir", t:"ES: Sentir | EN: To feel | PT: Sentir", pr:["sens","sens","sent","sentons","sentez","sentent"], pa:["ai senti","as senti","a senti","avons senti","avez senti","ont senti"], fu:["sentirai","sentiras","sentira","sentirons","sentirez","sentiront"] },
    { i:"Lire", t:"ES: Leer | EN: To read | PT: Ler", pr:["lis","lis","lit","lisons","lisez","lisent"], pa:["ai lu","as lu","a lu","avons lu","avez lu","ont lu"], fu:["lirai","liras","lira","lirons","lirez","liront"] },
    { i:"Écrire", t:"ES: Escribir | EN: To write | PT: Escrever", pr:["écris","écris","écrit","écrivons","écrivez","écrivent"], pa:["ai écrit","as écrit","a écrit","avons écrit","avez écrit","ont écrit"], fu:["écrirai","écriras","écrira","écrirons","écrirez","écriront"] },
    { i:"Chercher", t:"ES: Buscar | EN: To look for | PT: Buscar", pr:["cherche","cherches","cherche","cherchons","cherchez","cherchent"], pa:["ai cherché","as cherché","a cherché","avons cherché","avez cherché","ont cherché"], fu:["chercherai","chercheras","cherchera","chercherons","chercherez","chercheront"] },
    { i:"Appeler", t:"ES: Llamar | EN: To call | PT: Chamar", pr:["appelle","appelles","appelle","appelons","appelez","appellent"], pa:["ai appelé","as appelé","a appelé","avons appelé","avez appelé","ont appelé"], fu:["appellerai","appelleras","appellera","appellerons","appellerez","appelleront"] },
    { i:"Tomber", t:"ES: Caer | EN: To fall | PT: Cair", pr:["tombe","tombes","tombe","tombons","tombez","tombent"], pa:["suis tombé(e)","es tombé(e)","est tombé(e)","sommes tombé(e)s","êtes tombé(e)s","sont tombé(e)s"], fu:["tomberai","tomberas","tombera","tomberons","tomberez","tomberont"] },
    { i:"Travailler", t:"ES: Trabajar | EN: To work | PT: Trabalhar", pr:["travaille","travailles","travaille","travaillons","travaillez","travaillent"], pa:["ai travaillé","as travaillé","a travaillé","avons travaillé","avez travaillé","ont travaillé"], fu:["travaillerai","travailleras","travaillera","travaillerons","travaillerez","travailleront"] },
    { i:"Acheter", t:"ES: Comprar | EN: To buy | PT: Comprar", pr:["achète","achètes","achète","achetons","achetez","achètent"], pa:["ai acheté","as acheté","a acheté","avons acheté","avez acheté","ont acheté"], fu:["achèterai","achèteras","achètera","achèterons","achèterez","achèteront"] },
    { i:"Commencer", t:"ES: Comenzar | EN: To start | PT: Começar", pr:["commence","commences","commence","commençons","commencez","commencent"], pa:["ai commencé","as commencé","a commencé","avons commencé","avez commencé","ont commencé"], fu:["commencerai","commenceras","commencera","commencerons","commencerez","commenceront"] },
    { i:"Payer", t:"ES: Pagar | EN: To pay | PT: Pagar", pr:["paie","paies","paie","payons","payez","paient"], pa:["ai payé","as payé","a payé","avons payé","avez payé","ont payé"], fu:["paierai","paieras","paiera","paierons","paierez","paieront"] },
    { i:"Répondre", t:"ES: Responder | EN: To answer | PT: Responder", pr:["réponds","réponds","répond","répondons","répondez","répondent"], pa:["ai répondu","as répondu","a répondu","avons répondu","avez répondu","ont répondu"], fu:["répondrai","répondras","répondra","répondrons","répondrez","répondront"] },
    { i:"Perdre", t:"ES: Perder | EN: To lose | PT: Perder", pr:["perds","perds","perd","perdons","perdez","perdent"], pa:["ai perdu","as perdu","a perdu","avons perdu","avez perdu","ont perdu"], fu:["perdrai","perdras","perdra","perdrons","perdrez","perdront"] },
    { i:"Dormir", t:"ES: Dormir | EN: To sleep | PT: Dormir", pr:["dors","dors","dort","dormons","dormez","dorment"], pa:["ai dormi","as dormi","a dormi","avons dormi","avez dormi","ont dormi"], fu:["dormirai","dormiras","dormira","dormirons","dormirez","dormiront"] },
    { i:"Ouvrir", t:"ES: Abrir | EN: To open | PT: Abrir", pr:["ouvre","ouvres","ouvre","ouvrons","ouvrez","ouvrent"], pa:["ai ouvert","as ouvert","a ouvert","avons ouvert","avez ouvert","ont ouvert"], fu:["ouvrirai","ouvriras","ouvrira","ouvrirons","ouvrirez","ouvriront"] },
    { i:"Finir", t:"ES: Terminar | EN: To finish | PT: Terminar", pr:["finis","finis","finit","finissons","finissez","finissent"], pa:["ai fini","as fini","a fini","avons fini","avez fini","ont fini"], fu:["finirai","finiras","finira","finirons","finirez","finiront"] },
    { i:"Choisir", t:"ES: Elegir | EN: To choose | PT: Escolher", pr:["choisis","choisis","choisit","choisissons","choisissez","choisissent"], pa:["ai choisi","as choisi","a choisi","avons choisi","avez choisi","ont choisi"], fu:["choisirai","choisiras","choisira","choisirons","choisirez","choisiront"] },
    { i:"Entendre", t:"ES: Escuchar/Oír | EN: To hear | PT: Ouvir", pr:["entends","entends","entend","entendons","entendez","entendent"], pa:["ai entendu","as entendu","a entendu","avons entendu","avez entendu","ont entendu"], fu:["entendrai","entendras","entendra","entendrons","entendrez","entendront"] },
    { i:"Vivre", t:"ES: Vivir | EN: To live | PT: Viver", pr:["vis","vis","vit","vivons","vivez","vivent"], pa:["ai vécu","as vécu","a vécu","avons vécu","avez vécu","ont vécu"], fu:["vivrai","vivras","vivra","vivrons","vivrez","vivront"] },
    { i:"Rendre", t:"ES: Devolver | EN: To return | PT: Devolver", pr:["rends","rends","rend","rendons","rendez","rendent"], pa:["ai rendu","as rendu","a rendu","avons rendu","avez rendu","ont rendu"], fu:["rendrai","rendras","rendra","rendrons","rendrez","rendront"] },
    { i:"Tenir", t:"ES: Mantener/Tener | EN: To hold | PT: Segurar/Manter", pr:["tiens","tiens","tient","tenons","tenez","tiennent"], pa:["ai tenu","as tenu","a tenu","avons tenu","avez tenu","ont tenu"], fu:["tiendrai","tiendras","tiendra","tiendrons","tiendrez","tiendront"] }
];
const pron = ["Je/J'", "Tu", "Il/Elle", "Nous", "Vous", "Ils/Elles"];
let idx=0, tn="pr", md="flash", pIdx=0;

function up(){
    const v=verbs[idx];
    document.getElementById('fc-v').innerText=v.i; document.getElementById('fc-t').innerText=v.t;
    let h=""; v[tn].forEach((c,i)=>h+=`<div class="c-item"><b>${pron[i]}</b> ${c}</div>`);
    document.getElementById('fc-c').innerHTML=h;
    if(md==='ex'){
        document.getElementById('ex-p').innerText=`${pron[pIdx]} (${v.i})`;
        document.getElementById('ex-f').innerText=""; document.getElementById('ex-in').value="";
    }
}
function setMode(m){
    md=m; document.getElementById('vFlash').style.display=m==='flash'?'block':'none';
    document.getElementById('vEx').style.display=m==='ex'?'block':'none';
    document.getElementById('bFlash').className=m==='flash'?'act':''; document.getElementById('bEx').className=m==='ex'?'act':'';
    up();
}
function chTense(){ tn=document.getElementById('tSelect').value; up(); }
function check(){
    const u=document.getElementById('ex-in').value.toLowerCase().trim();
    const c=verbs[idx][tn][pIdx]; const f=document.getElementById('ex-f');
    if(u===c){ f.innerText="Correct !"; f.style.color="green"; setTimeout(next,1000); }
    else{ f.innerText=`Incorrect. Réponse: ${c}`; f.style.color="red"; }
}
function next(){
    if(md==='ex'){ pIdx++; if(pIdx>=6){pIdx=0;idx++;} }else{ idx++; }
    if(idx>=verbs.length)idx=0; up();
}
function prev(){
    idx--; if(idx<0)idx=verbs.length-1; pIdx=0; up();
}
function shuffle(){
    verbs.sort(() => Math.random() - 0.5);
    idx = 0;
    pIdx = Math.floor(Math.random() * pron.length);
    up();
}
up();
</script>
</body>
</html>
