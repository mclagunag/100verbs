<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Verbos | Español</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{--a:#A66F5D;--d:#34231D;--b:#FCFAF2;--w:#FFF}
        body{font-family:'Inter',sans-serif;background:var(--b);color:var(--d);margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px}
        .container{max-width:600px;width:100%;text-align:center}
        h1{font-weight:300;margin-bottom:40px}
        .nav{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
        button,select{font-family:'Inter';padding:12px 20px;border-radius:8px;border:1px solid var(--a);background:transparent;color:var(--d);cursor:pointer;font-size:14px;transition:.3s}
        button:hover,.act{background:var(--a);color:var(--b)}
        .card-box{perspective:1000px;height:350px;margin-bottom:30px;cursor:pointer}
        .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s}
        .card.flip{transform:rotateY(180deg)}
        .front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--w);border-radius:20px;padding:30px;box-sizing:border-box;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        .back{transform:rotateY(180deg);align-items:flex-start}
        .v-main{font-size:42px;font-weight:600;margin:0}
        .trans{color:var(--a);font-size:14px;margin-top:15px}
        .c-item{margin:8px 0;font-size:18px;width:100%;border-bottom:1px solid #eee;padding-bottom:4px;text-align:left;}
        .ex-area{background:var(--w);padding:40px;border-radius:20px;display:none;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        input{width:90%;padding:15px;border:none;border-bottom:2px solid var(--a);font-size:20px;text-align:center;outline:none;margin:20px 0;font-family:'Inter'}
        .feed{font-weight:600;margin-top:15px;height:20px}
        .foot{display:flex;justify-content:space-between;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>Práctica de Verbos</h1>
    <div class="nav">
        <select id="tSelect" onchange="chTense()">
            <option value="pr">Presente</option>
            <option value="pa">Pasado (Pretérito)</option>
            <option value="fu">Futuro</option>
        </select>
        <button id="bFlash" class="act" onclick="setMode('flash')">Flashcards</button>
        <button id="bEx" onclick="setMode('ex')">Ejercicios</button>
    </div>
    <div id="vFlash">
        <div class="card-box" onclick="this.querySelector('.card').classList.toggle('flip')">
            <div class="card">
                <div class="front">
                    <p class="v-main" id="fc-v">Verbo</p>
                    <div class="trans" id="fc-t">Traducción</div>
                </div>
                <div class="back" id="fc-c"></div>
            </div>
        </div>
    </div>
    <div id="vEx" class="ex-area">
        <p id="ex-p" style="font-size: 18px;"></p>
        <input type="text" id="ex-in" autocomplete="off" placeholder="Escribe aquí...">
        <div id="ex-f" class="feed"></div>
        <button onclick="check()" style="margin-top:10px;width:100%;background:var(--d);color:white;">Comprobar</button>
    </div>
    <div class="foot">
        <button onclick="prev()">Anterior</button>
        <button onclick="shuffle()" style="background: var(--d); color: white;">Aleatorio 🔀</button>
        <button onclick="next()">Siguiente</button>
    </div>
</div>
<script>
const verbs = [
    { i:"Ser", t:"PT: Ser | EN: To be | FR: Être", pr:["soy","eres","es","somos","son"], pa:["fui","fuiste","fue","fuimos","fueron"], fu:["seré","serás","será","seremos","serán"] },
    { i:"Estar", t:"PT: Estar | EN: To be | FR: Être", pr:["estoy","estás","está","estamos","están"], pa:["estuve","estuviste","estuvo","estuvimos","estuvieron"], fu:["estaré","estarás","estará","estaremos","estarán"] },
    { i:"Tener", t:"PT: Ter | EN: To have | FR: Avoir", pr:["tengo","tienes","tiene","tenemos","tienen"], pa:["tuve","tuviste","tuvo","tuvimos","tuvieron"], fu:["tendré","tendrás","tendrá","tendremos","tendrán"] },
    { i:"Ir", t:"PT: Ir | EN: To go | FR: Aller", pr:["voy","vas","va","vamos","van"], pa:["fui","fuiste","fue","fuimos","fueron"], fu:["iré","irás","irá","iremos","irán"] },
    { i:"Hacer", t:"PT: Fazer | EN: To do/make | FR: Faire", pr:["hago","haces","hace","hacemos","hacen"], pa:["hice","hiciste","hizo","hicimos","hicieron"], fu:["haré","harás","hará","haremos","harán"] },
    { i:"Poder", t:"PT: Poder | EN: To be able to | FR: Pouvoir", pr:["puedo","puedes","puede","podemos","pueden"], pa:["pude","pudiste","pudo","pudimos","pudieron"], fu:["podré","podrás","podrá","podremos","podrán"] },
    { i:"Decir", t:"PT: Dizer | EN: To say | FR: Dire", pr:["digo","dices","dice","decimos","dicen"], pa:["dije","dijiste","dijo","dijimos","dijeron"], fu:["diré","dirás","dirá","diremos","dirán"] },
    { i:"Querer", t:"PT: Querer | EN: To want | FR: Vouloir", pr:["quiero","quieres","quiere","queremos","quieren"], pa:["quise","quisiste","quiso","quisimos","quisieron"], fu:["querré","querrás","querrá","querremos","querrán"] },
    { i:"Ver", t:"PT: Ver | EN: To see | FR: Voir", pr:["veo","ves","ve","vemos","ven"], pa:["vi","viste","vio","vimos","vieron"], fu:["veré","verás","verá","veremos","verán"] },
    { i:"Saber", t:"PT: Saber | EN: To know | FR: Savoir", pr:["sé","sabes","sabe","sabemos","saben"], pa:["supe","supiste","supo","supimos","supieron"], fu:["sabré","sabrás","sabrá","sabremos","sabrán"] },
    { i:"Dar", t:"PT: Dar | EN: To give | FR: Donner", pr:["doy","das","da","damos","dan"], pa:["di","diste","dio","dimos","dieron"], fu:["daré","darás","dará","daremos","darán"] },
    { i:"Venir", t:"PT: Vir | EN: To come | FR: Venir", pr:["vengo","vienes","viene","venimos","vienen"], pa:["vine","viniste","vino","vinimos","vinieron"], fu:["vendré","vendrás","vendrá","vendremos","vendrán"] },
    { i:"Hablar", t:"PT: Falar | EN: To speak | FR: Parler", pr:["hablo","hablas","habla","hablamos","hablan"], pa:["hablé","hablaste","habló","hablamos","hablaron"], fu:["hablaré","hablarás","hablará","hablaremos","hablarán"] },
    { i:"Comer", t:"PT: Comer | EN: To eat | FR: Manger", pr:["como","comes","come","comemos","comen"], pa:["comí","comiste","comió","comimos","comieron"], fu:["comeré","comerás","comerá","comeremos","comerán"] },
    { i:"Vivir", t:"PT: Viver | EN: To live | FR: Vivre", pr:["vivo","vives","vive","vivimos","viven"], pa:["viví","viviste","vivió","vivimos","vivieron"], fu:["viviré","vivirás","vivirá","viviremos","vivirán"] },{ i:"Pensar", t:"PT: Pensar | EN: To think | FR: Penser", pr:["pienso","piensas","piensa","pensamos","piensan"], pa:["pensé","pensaste","pensó","pensamos","pensaron"], fu:["pensaré","pensarás","pensará","pensaremos","pensarán"] },      { i:"Conocer", t:"PT: Conhecer | EN: To know | FR: Connaître", pr:["encuentro","encuentras","encuentra","encontramos","encuentran"], pa:["encontré","encontraste","encontró","encontramos","encontraron"], fu:["encontraré","encontrarás","encontrará","encontraremos","encontrarán"] },
    { i:"Salir", t:"PT: SPôr/Colocar | EN: To put | FR: Mettre:["salgo","sales","sale","salimos","salen"], pa:["salí","saliste","salió","salimos","salieron"], fu:["saldré","saldrás","saldrá","saldremos","saldrán"] },
    { i:"Conocer", t:"PT: Conhecer | EN: To know | FR: Connaître", pr:["conozco","conoces","conoce","conocemos","conocen"], pa:["conocí","conociste","conoció","conocimos","conocieron"], fu:["conoceré","conocerás","conocerá","conoceremos","conocerán"] },
    { i:"Llegar", t:"PT: Chegar | EN: To arrive | FR: Arriver", pr:["llego","llegas","llega","llegamos","llegan"], pa:["llegué","llegaste","llegó","llegamos","llegaron"], fu:["llegaré","llegarás","llegará","llegaremos","llegarán"] },
    { i:"Creer", t:"PT: Crer/Acreditar | EN: To believe | FR: Croire", pr:["creo","crees","cree","creemos","creen"], pa:["creí","creíste","creyó","creímos","creyeron"], fu:["creeré","creerás","creerá","creeremos","creerán"] },
    { i:"Poner", t:"PT: Pôr/Colocar | EN: To put | FR: Mettre", pr:["pongo","pones","pone","ponemos","ponen"], pa:["puse","pusiste","puso","pusimos","pusieron"], fu:["pondré","pondrás","pondrá","pondremos","pondrán"] },
    { i:"Parecer", t:"PT: Parecer | EN: To seem | FR: Sembler", pr:["parezco","pareces","parece","parecemos","parecen"], pa:["parecí","pareciste","pareció","parecimos","parecieron"], fu:["pareceré","parecerás","parecerá","pareceremos","parecerán"] },
    { i:"Traer", t:"PT: Trazer | EN: To bring | FR: Apporter", pr:["traigo","traes","trae","traemos","traen"], pa:["traje","trajiste","trajo","trajimos","trajeron"], fu:["traeré","traerás","traerá","traeremos","traerán"] },
    { i:"Seguir", t:"PT: Seguir | EN: To follow | FR: Suivre", pr:["sigo","sigues","sigue","seguimos","siguen"], pa:["seguí","seguiste","siguió","seguimos","siguieron"], fu:["seguiré","seguirás","seguirá","seguiremos","seguirán"] },
    { i:"Tomar", t:"PT: Tomar | EN: To take | FR: Prendre", pr:["tomo","tomas","toma","tomamos","toman"], pa:["tomé","tomaste","tomó","tomamos","tomaron"], fu:["tomaré","tomarás","tomará","tomaremos","tomarán"] },
    { i:"Buscar", t:"PT: Buscar | EN: To search | FR: Chercher", pr:["busco","buscas","busca","buscamos","buscan"], pa:["busqué","buscaste","buscó","buscamos","buscaron"], fu:["buscaré","buscarás","buscará","buscaremos","buscarán"] },
    { i:"Llamar", t:"PT: Chamar | EN: To call | FR: Appeler", pr:["llamo","llamas","llama","llamamos","llaman"], pa:["llamé","llamaste","llamó","llamamos","llamaron"], fu:["llamaré","llamarás","llamará","llamaremos","llamarán"] },
    { i:"Pasar", t:"PT: Passar | EN: To pass/spend | FR: Passer", pr:["paso","pasas","pasa","pasamos","pasan"], pa:["pasé","pasaste","pasó","pasamos","pasaron"], fu:["pasaré","pasarás","pasará","pasaremos","pasarán"] },
    { i:"Trabajar", t:"PT: Trabalhar | EN: To work | FR: Travailler", pr:["trabajo","trabajas","trabaja","trabajamos","trabajan"], pa:["trabajé","trabajaste","trabajó","trabajamos","trabajaron"], fu:["trabajaré","trabajarás","trabajará","trabajaremos","trabajarán"] },
    { i:"Esperar", t:"PT: Esperar | EN: To wait/hope | FR: Attendre", pr:["espero","esperas","espera","esperamos","esperan"], pa:["esperé","esperaste","esperó","esperamos","esperaron"], fu:["esperaré","esperarás","esperará","esperaremos","esperarán"] },
    { i:"Entender", t:"PT: Entender | EN: To understand | FR: Comprendre", pr:["entiendo","entiendes","entiende","entendemos","entienden"], pa:["entendí","entendiste","entendió","entendimos","entendieron"], fu:["entenderé","entenderás","entenderá","entenderemos","entenderán"] },
    { i:"Sentir", t:"PT: Sentir | EN: To feel | FR: Sentir", pr:["siento","sientes","siente","sentimos","sienten"], pa:["sentí","sentiste","sintió","sentimos","sintieron"], fu:["sentiré","sentirás","sentirá","sentiremos","sentirán"] },
    { i:"Dejar", t:"PT: Deixar | EN: To leave/let | FR: Laisser", pr:["dejo","dejas","deja","dejamos","dejan"], pa:["dejé","dejaste","dejó","dejamos","dejaron"], fu:["dejaré","dejarás","dejará","dejaremos","dejarán"] },
    { i:"Quedar", t:"PT: Ficar | EN: To stay/remain | FR: Rester", pr:["quedo","quedas","queda","quedamos","quedan"], pa:["quedé","quedaste","quedó","quedamos","quedaron"], fu:["quedaré","quedarás","quedará","quedaremos","quedarán"] },
    { i:"Recordar", t:"PT: Lembrar | EN: To remember | FR: Se rappeler", pr:["recuerdo","recuerdas","recuerda","recordamos","recuerdan"], pa:["recordé","recordaste","recordó","recordamos","recordaron"], fu:["recordaré","recordarás","recordará","recordaremos","recordarán"] },
    { i:"Comenzar", t:"PT: Começar | EN: To begin | FR: Commencer", pr:["comienzo","comienzas","comienza","comenzamos","comienzan"], pa:["comencé","comenzaste","comenzó","comenzamos","comenzaron"], fu:["comenzaré","comenzarás","comenzará","comenzaremos","comenzarán"] },
    { i:"Empezar", t:"PT: Começar | EN: To start | FR: Commencer", pr:["empiezo","empiezas","empieza","empezamos","empiezan"], pa:["empecé","empezaste","empezó","empezamos","empezaron"], fu:["empezaré","empezarás","empezará","empezaremos","empezarán"] },
    { i:"Escribir", t:"PT: Escrever | EN: To write | FR: Écrire", pr:["escribo","escribes","escribe","escribimos","escriben"], pa:["escribí","escribiste","escribió","escribimos","escribieron"], fu:["escribiré","escribirás","escribirá","escribiremos","escribirán"] },
    { i:"Perder", t:"PT: Perder | EN: To lose | FR: Perdre", pr:["pierdo","pierdes","pierde","perdemos","pierden"], pa:["perdí","perdiste","perdió","perdimos","perdieron"], fu:["perderé","perderás","perderá","perderemos","perderán"] },
    { i:"Pagar", t:"PT: Pagar | EN: To pay | FR: Payer", pr:["pago","pagas","paga","pagamos","pagan"], pa:["pagué","pagaste","pagó","pagamos","pagaron"], fu:["pagaré","pagarás","pagará","pagaremos","pagarán"] },
    { i:"Jugar", t:"PT: Jogar | EN: To play | FR: Jouer", pr:["juego","juegas","juega","jugamos","juegan"], pa:["jugué","jugaste","jugó","jugamos","jugaron"], fu:["jugaré","jugarás","jugará","jugaremos","jugarán"] },
    { i:"Escuchar", t:"PT: Escutar | EN: To listen | FR: Écouter", pr:["escucho","escuchas","escucha","escuchamos","escuchan"], pa:["escuché","escuchaste","escuchó","escuchamos","escucharon"], fu:["escucharé","escucharás","escuchará","escucharemos","escucharán"] },
    { i:"Leer", t:"PT: Ler | EN: To read | FR: Lire", pr:["leo","lees","lee","leemos","leen"], pa:["leí","leíste","leyó","leímos","leyeron"], fu:["leeré","leerás","leerá","leeremos","leerán"] },
    { i:"Cambiar", t:"PT: Mudar | EN: To change | FR: Changer", pr:["cambio","cambias","cambia","cambiamos","cambian"], pa:["cambié","cambiaste","cambió","cambiamos","cambiaron"], fu:["cambiaré","cambiarás","cambiará","cambiaremos","cambiarán"] },
    { i:"Ayudar", t:"PT: Ajudar | EN: To help | FR: Aider", pr:["ayudo","ayudas","ayuda","ayudamos","ayudan"], pa:["ayudé","ayudaste","ayudó","ayudamos","ayudaron"], fu:["ayudaré","ayudarás","ayudará","ayudaremos","ayudarán"] },
    { i:"Pedir", t:"PT: Pedir | EN: To ask for | FR: Demander", pr:["pido","pides","pide","pedimos","piden"], pa:["pedí","pediste","pidió","pedimos","pidieron"], fu:["pediré","pedirás","pedirá","pediremos","pedirán"] },
    { i:"Explicar", t:"PT: Explicar | EN: To explain | FR: Expliquer", pr:["explico","explicas","explica","explicamos","explican"], pa:["expliqué","explicaste","explicó","explicamos","explicaron"], fu:["explicaré","explicarás","explicará","explicaremos","explicarán"] },
    { i:"Aprender", t:"PT: Aprender | EN: To learn | FR: Apprendre", pr:["aprendo","aprendes","aprende","aprendemos","aprenden"], pa:["aprendí","aprendiste","aprendió","aprendimos","aprendieron"], fu:["aprenderé","aprenderás","aprenderá","aprenderemos","aprenderán"] },
    { i:"Comprender", t:"PT: Compreender | EN: To understand | FR: Comprendre", pr:["comprendo","comprendes","comprende","comprendemos","comprenden"], pa:["comprendí","comprendiste","comprendió","comprendimos","comprendieron"], fu:["comprenderé","comprenderás","comprenderá","comprenderemos","comprenderán"] }
];
const pron = ["Yo", "Tú", "Él/Ella/Ud.", "Nosotros", "Ellos/Ellas/Uds."];
let idx=0, tn="pr", md="flash", pIdx=0;

function up(){
    const v=verbs[idx];
    document.getElementById('fc-v').innerText=v.i; document.getElementById('fc-t').innerText=v.t;
    let h=""; v[tn].forEach((c,i)=>h+=`<div class="c-item"><b>${pron[i]}</b> ${c}</div>`);
    document.getElementById('fc-c').innerHTML=h;
    if(md==='ex'){
        document.getElementById('ex-p').innerText=`${pron[pIdx]} (${v.i})`;
        document.getElementById('ex-f').innerText=""; document.getElementById('ex-in').value="";
    }
}
function setMode(m){
    md=m; document.getElementById('vFlash').style.display=m==='flash'?'block':'none';
    document.getElementById('vEx').style.display=m==='ex'?'block':'none';
    document.getElementById('bFlash').className=m==='flash'?'act':''; document.getElementById('bEx').className=m==='ex'?'act':'';
    up();
}
function chTense(){ tn=document.getElementById('tSelect').value; up(); }
function check(){
    const u=document.getElementById('ex-in').value.toLowerCase().trim();
    const c=verbs[idx][tn][pIdx]; const f=document.getElementById('ex-f');
    if(u===c){ f.innerText="¡Correcto!"; f.style.color="green"; setTimeout(next,1000); }
    else{ f.innerText=`Incorrecto. Respuesta: ${c}`; f.style.color="red"; }
}
function next(){
    if(md==='ex'){ pIdx++; if(pIdx>=5){pIdx=0;idx++;} }else{ idx++; }
    if(idx>=verbs.length)idx=0; up();
}
function prev(){
    idx--; if(idx<0)idx=verbs.length-1; pIdx=0; up();
}
function shuffle(){
    verbs.sort(() => Math.random() - 0.5);
    idx = 0;
    pIdx = Math.floor(Math.random() * pron.length);
    up();
}
up();
</script>
</body>
</html>
