<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática de Verbos | Português</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{--a:#A66F5D;--d:#34231D;--b:#FCFAF2;--w:#FFF}
        body{font-family:'Inter',sans-serif;background:var(--b);color:var(--d);margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px}
        .container{max-width:600px;width:100%;text-align:center}
        h1{font-weight:300;margin-bottom:40px}
        .nav{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
        button,select{font-family:'Inter';padding:12px 20px;border-radius:8px;border:1px solid var(--a);background:transparent;color:var(--d);cursor:pointer;font-size:14px;transition:.3s}
        button:hover,.act{background:var(--a);color:var(--b)}
        .card-box{perspective:1000px;height:350px;margin-bottom:30px;cursor:pointer}
        .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s}
        .card.flip{transform:rotateY(180deg)}
        .front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--w);border-radius:20px;padding:30px;box-sizing:border-box;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        .back{transform:rotateY(180deg);align-items:flex-start}
        .v-main{font-size:42px;font-weight:600;margin:0}
        .trans{color:var(--a);font-size:14px;margin-top:15px}
        .c-item{margin:8px 0;font-size:18px;width:100%;border-bottom:1px solid #eee;padding-bottom:4px;text-align:left;}
        .ex-area{background:var(--w);padding:40px;border-radius:20px;display:none;box-shadow:0 10px 30px rgba(52,35,29,.05)}
        input{width:90%;padding:15px;border:none;border-bottom:2px solid var(--a);font-size:20px;text-align:center;outline:none;margin:20px 0;font-family:'Inter'}
        .feed{font-weight:600;margin-top:15px;height:20px}
        .foot{display:flex;justify-content:space-between;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>Prática de Verbos</h1>
    <div class="nav">
        <select id="tSelect" onchange="chTense()">
            <option value="pr">Presente</option>
            <option value="pa">Passado (Pretérito)</option>
            <option value="fu">Futuro</option>
        </select>
        <button id="bFlash" class="act" onclick="setMode('flash')">Flashcards</button>
        <button id="bEx" onclick="setMode('ex')">Exercícios</button>
    </div>
    <div id="vFlash">
        <div class="card-box" onclick="this.querySelector('.card').classList.toggle('flip')">
            <div class="card">
                <div class="front">
                    <p class="v-main" id="fc-v">Verbo</p>
                    <div class="trans" id="fc-t">Tradução</div>
                </div>
                <div class="back" id="fc-c"></div>
            </div>
        </div>
    </div>
    <div id="vEx" class="ex-area">
        <p id="ex-p" style="font-size: 18px;"></p>
        <input type="text" id="ex-in" autocomplete="off" placeholder="Escreva aqui...">
        <div id="ex-f" class="feed"></div>
        <button onclick="check()" style="margin-top:10px;width:100%;background:var(--d);color:white;">Verificar</button>
    </div>
    <div class="foot">
        <button onclick="prev()">Anterior</button>
        <button onclick="shuffle()" style="background: var(--d); color: white;">Aleatório 🔀</button>
        <button onclick="next()">Próximo</button>
    </div>
</div>
<script>
const verbs = [
    { i:"Ser", t:"FR: Être | ES: Ser | EN: To be", pr:["sou","é","é","somos","são"], pa:["fui","foi","foi","fomos","foram"], fu:["serei","será","será","seremos","serão"] },
    { i:"Estar", t:"FR: Être | ES: Estar | EN: To be", pr:["estou","está","está","estamos","estão"], pa:["estive","esteve","esteve","estivemos","estiveram"], fu:["estarei","estará","estará","estaremos","estarão"] },
    { i:"Ter", t:"FR: Avoir | ES: Tener | EN: To have", pr:["tenho","tem","tem","temos","têm"], pa:["tive","teve","teve","tivemos","tiveram"], fu:["terei","terá","terá","teremos","terão"] },
    { i:"Ir", t:"FR: Aller | ES: Ir | EN: To go", pr:["vou","vai","vai","vamos","vão"], pa:["fui","foi","foi","fomos","foram"], fu:["irei","irá","irá","iremos","irão"] },
    { i:"Fazer", t:"FR: Faire | ES: Hacer | EN: To do/make", pr:["faço","faz","faz","fazemos","fazem"], pa:["fiz","fez","fez","fizemos","fizeram"], fu:["farei","fará","fará","faremos","farão"] },
    { i:"Poder", t:"FR: Pouvoir | ES: Poder | EN: To be able", pr:["posso","pode","pode","podemos","podem"], pa:["pude","pôde","pôde","pudemos","puderam"], fu:["poderei","poderá","poderá","poderemos","poderão"] },
    { i:"Dizer", t:"FR: Dire | ES: Decir | EN: To say", pr:["digo","diz","diz","dizemos","dizem"], pa:["disse","disse","disse","dissemos","disseram"], fu:["direi","dirá","dirá","diremos","dirão"] },
    { i:"Querer", t:"FR: Vouloir | ES: Querer | EN: To want", pr:["quero","quer","quer","queremos","querem"], pa:["quis","quis","quis","quisemos","quiseram"], fu:["quererei","quererá","quererá","quereremos","quererão"] },
    { i:"Ver", t:"FR: Voir | ES: Ver | EN: To see", pr:["vejo","vê","vê","vemos","veem"], pa:["vi","viu","viu","vimos","viram"], fu:["verei","verá","verá","veremos","verão"] },
    { i:"Saber", t:"FR: Savoir | ES: Saber | EN: To know", pr:["sei","sabe","sabe","sabemos","sabem"], pa:["soube","soube","soube","soubemos","souberam"], fu:["saberei","saberá","saberá","saberemos","saberão"] },
    { i:"Dar", t:"FR: Donner | ES: Dar | EN: To give", pr:["dou","dá","dá","damos","dão"], pa:["dei","deu","deu","demos","deram"], fu:["darei","dará","dará","daremos","darão"] },
    { i:"Vir", t:"FR: Venir | ES: Venir | EN: To come", pr:["venho","vem","vem","vimos","vêm"], pa:["vim","veio","veio","viemos","vieram"], fu:["virei","virá","virá","viremos","virão"] },
    { i:"Falar", t:"FR: Parler | ES: Hablar | EN: To speak", pr:["falo","fala","fala","falamos","falam"], pa:["falei","falou","falou","falamos","falaram"], fu:["falarei","falará","falará","falaremos","falarão"] },
    { i:"Comer", t:"FR: Manger | ES: Comer | EN: To eat", pr:["como","come","come","comemos","comem"], pa:["comi","comeu","comeu","comemos","comeram"], fu:["comerei","comerá","comerá","comeremos","comerão"] },
    { i:"Gostar", t:"FR: Aimer | ES: Gustar | EN: To like", pr:["gosto","gosta","gosta","gostamos","gostam"], pa:["gostei","gostou","gostou","gostamos","gostaram"], fu:["gostarei","gostará","gostará","gostaremos","gostarão"] },{ i:"Pensar", t:"FR: Penser | ES: Pensar | EN: To think", pr:["penso","pensa","pensa","pensamos","pensam"], pa:["pensei","pensou","pensou","pensamos","pensaram"], fu:["pensarei","pensará","pensará","pensaremos","pensarão"] },
    { i:"Encontrar", t:"FR: Trouver | ES: Encontrar | EN: To find", pr:["encontro","encontra","encontra","encontramos","encontram"], pa:["encontrei","encontrou","encontrou","encontramos","encontraram"], fu:["encontrarei","encontrará","encontrará","encontraremos","encontrarão"] },
    { i:"Sair", t:"FR: Sortir | ES: Salir | EN: To go out", pr:["saio","sai","sai","saímos","saem"], pa:["saí","saiu","saiu","saímos","saíram"], fu:["sairei","sairá","sairá","sairemos","sairão"] },
    { i:"Conhecer", t:"FR: Connaître | ES: Conocer | EN: To know", pr:["conheço","conhece","conhece","conhecemos","conhecem"], pa:["conheci","conheceu","conheceu","conhecemos","conheceram"], fu:["conhecerei","conhecerá","conhecerá","conheceremos","conhecerão"] },
    { i:"Chegar", t:"FR: Arriver | ES: Llegar | EN: To arrive", pr:["chego","chega","chega","chegamos","chegam"], pa:["cheguei","chegou","chegou","chegamos","chegaram"], fu:["chegarei","chegará","chegará","chegaremos","chegarão"] },
    { i:"Acreditar", t:"FR: Croire | ES: Creer | EN: To believe", pr:["acredito","acredita","acredita","acreditamos","acreditam"], pa:["acreditei","acreditou","acreditou","acreditamos","acreditaram"], fu:["acreditarei","acreditará","acreditará","acreditaremos","acreditarão"] },
    { i:"Pôr", t:"FR: Mettre | ES: Poner | EN: To put", pr:["ponho","põe","põe","pomos","põem"], pa:["pus","pôs","pôs","pusemos","puseram"], fu:["porei","porá","porá","poremos","porão"] },
    { i:"Parecer", t:"FR: Sembler | ES: Parecer | EN: To seem", pr:["pareço","parece","parece","parecemos","parecem"], pa:["pareci","pareceu","pareceu","parecemos","pareceram"], fu:["parecerei","parecerá","parecerá","pareceremos","parecerão"] },
    { i:"Trazer", t:"FR: Apporter | ES: Traer | EN: To bring", pr:["trago","traz","traz","trazemos","trazem"], pa:["trouxe","trouxe","trouxe","trouxemos","trouxeram"], fu:["trarei","trará","trará","traremos","trarão"] },
    { i:"Seguir", t:"FR: Suivre | ES: Seguir | EN: To follow", pr:["sigo","segue","segue","seguimos","seguem"], pa:["segui","seguiu","seguiu","seguimos","seguiram"], fu:["seguirei","seguirá","seguirá","seguiremos","seguirão"] },
    { i:"Tomar", t:"FR: Prendre | ES: Tomar | EN: To take", pr:["tomo","toma","toma","tomamos","tomam"], pa:["tomei","tomou","tomou","tomamos","tomaram"], fu:["tomarei","tomará","tomará","tomaremos","tomarão"] },
    { i:"Buscar", t:"FR: Chercher | ES: Buscar | EN: To look for", pr:["busco","busca","busca","buscamos","buscam"], pa:["busquei","buscou","buscou","buscamos","buscaram"], fu:["buscarei","buscará","buscará","buscaremos","buscarão"] },
    { i:"Chamar", t:"FR: Appeler | ES: Llamar | EN: To call", pr:["chamo","chama","chama","chamamos","chamam"], pa:["chamei","chamou","chamou","chamamos","chamaram"], fu:["chamarei","chamará","chamará","chamaremos","chamarão"] },
    { i:"Passar", t:"FR: Passer | ES: Pasar | EN: To pass", pr:["passo","passa","passa","passamos","passam"], pa:["passei","passou","passou","passamos","passaram"], fu:["passarei","passará","passará","passaremos","passarão"] },
    { i:"Trabalhar", t:"FR: Travailler | ES: Trabajar | EN: To work", pr:["trabalho","trabalha","trabalha","trabalhamos","trabalham"], pa:["trabalhei","trabalhou","trabalhou","trabalhamos","trabalharam"], fu:["trabalharei","trabalhará","trabalhará","trabalharemos","trabalharão"] },
    { i:"Esperar", t:"FR: Attendre | ES: Esperar | EN: To wait", pr:["espero","espera","espera","esperamos","esperam"], pa:["esperei","esperou","esperou","esperamos","esperaram"], fu:["esperarei","esperará","esperará","esperaremos","esperarão"] },
    { i:"Entender", t:"FR: Comprendre | ES: Entender | EN: To understand", pr:["entendo","entende","entende","entendemos","entendem"], pa:["entendi","entendeu","entendeu","entendemos","entenderam"], fu:["entenderei","entenderá","entenderá","entenderemos","entenderão"] },
    { i:"Sentir", t:"FR: Sentir | ES: Sentir | EN: To feel", pr:["sinto","sente","sente","sentimos","sentem"], pa:["senti","sentiu","sentiu","sentimos","sentiram"], fu:["sentirei","sentirá","sentirá","sentiremos","sentirão"] },
    { i:"Deixar", t:"FR: Laisser | ES: Dejar | EN: To leave/let", pr:["deixo","deixa","deixa","deixamos","deixam"], pa:["deixei","deixou","deixou","deixamos","deixaram"], fu:["deixarei","deixará","deixará","deixaremos","deixarão"] },
    { i:"Ficar", t:"FR: Rester | ES: Quedar | EN: To stay", pr:["fico","fica","fica","ficamos","ficam"], pa:["fiquei","ficou","ficou","ficamos","ficaram"], fu:["ficarei","ficará","ficará","ficaremos","ficarão"] },
    { i:"Lembrar", t:"FR: Se rappeler | ES: Recordar | EN: To remember", pr:["lembro","lembra","lembra","lembramos","lembram"], pa:["lembrei","lembrou","lembrou","lembramos","lembraram"], fu:["lembrarei","lembrará","lembrará","lembraremos","lembrarão"] },
    { i:"Começar", t:"FR: Commencer | ES: Comenzar | EN: To begin", pr:["começo","começa","começa","começamos","começam"], pa:["comecei","começou","começou","começamos","começaram"], fu:["começarei","começará","começará","começaremos","começarão"] },
    { i:"Escrever", t:"FR: Écrire | ES: Escribir | EN: To write", pr:["escrevo","escreve","escreve","escrevemos","escrevem"], pa:["escrevi","escreveu","escreveu","escrevemos","escreveram"], fu:["escreverei","escreverá","escreverá","escreveremos","escreverão"] },
    { i:"Perder", t:"FR: Perdre | ES: Perder | EN: To lose", pr:["perco","perde","perde","perdemos","perdem"], pa:["perdi","perdeu","perdeu","perdemos","perderam"], fu:["perderei","perderá","perderá","perderemos","perderão"] },
    { i:"Pagar", t:"FR: Payer | ES: Pagar | EN: To pay", pr:["pago","paga","paga","pagamos","pagam"], pa:["paguei","pagou","pagou","pagamos","pagaram"], fu:["pagarei","pagará","pagará","pagaremos","pagarão"] },
    { i:"Jogar", t:"FR: Jouer | ES: Jugar | EN: To play", pr:["jogo","joga","joga","jogamos","jogam"], pa:["joguei","jogou","jogou","jogamos","jogaram"], fu:["jogarei","jogará","jogará","jogaremos","jogarão"] },
    { i:"Escutar", t:"FR: Écouter | ES: Escuchar | EN: To listen", pr:["escuto","escuta","escuta","escutamos","escutam"], pa:["escutei","escutou","escutou","escutamos","escutaram"], fu:["escutarei","escutará","escutará","escutaremos","escutarão"] },
    { i:"Ler", t:"FR: Lire | ES: Leer | EN: To read", pr:["leio","lê","lê","lemos","leem"], pa:["li","leu","leu","lemos","leram"], fu:["lerei","lerá","lerá","leremos","lerão"] },
    { i:"Mudar", t:"FR: Changer | ES: Cambiar | EN: To change", pr:["mudo","muda","muda","mudamos","mudam"], pa:["mudei","mudou","mudou","mudamos","mudaram"], fu:["mudarei","mudará","mudará","mudaremos","mudarão"] },
    { i:"Ajudar", t:"FR: Aider | ES: Ayudar | EN: To help", pr:["ajudo","ajuda","ajuda","ajudamos","ajudam"], pa:["ajudei","ajudou","ajudou","ajudamos","ajudaram"], fu:["ajudarei","ajudará","ajudará","ajudaremos","ajudarão"] },
    { i:"Pedir", t:"FR: Demander | ES: Pedir | EN: To ask", pr:["peço","pede","pede","pedimos","pedem"], pa:["pedi","pediu","pediu","pedimos","pediram"], fu:["pedirei","pedirá","pedirá","pediremos","pedirão"] },
    { i:"Explicar", t:"FR: Expliquer | ES: Explicar | EN: To explain", pr:["explico","explica","explica","explicamos","explicam"], pa:["expliquei","explicou","explicou","explicamos","explicaram"], fu:["explicarei","explicará","explicará","explicaremos","explicarão"] },
    { i:"Aprender", t:"FR: Apprendre | ES: Aprender | EN: To learn", pr:["aprendo","aprende","aprende","aprendemos","aprendem"], pa:["aprendi","aprendeu","aprendeu","aprendemos","aprenderam"], fu:["aprenderei","aprenderá","aprenderá","aprenderemos","aprenderão"] },
    { i:"Dormir", t:"FR: Dormir | ES: Dormir | EN: To sleep", pr:["durmo","dorme","dorme","dormimos","dormem"], pa:["dormi","dormiu","dormiu","dormimos","dormiram"], fu:["dormirei","dormirá","dormirá","dormiremos","dormirão"] },
    { i:"Cair", t:"FR: Tomber | ES: Caer | EN: To fall", pr:["caio","cai","cai","caímos","caem"], pa:["caí","caiu","caiu","caímos","caíram"], fu:["cairei","cairá","cairá","cairemos","cairão"] }
];
const pron = ["Eu", "Você", "Ele/Ela", "Nós", "Eles/Elas"];
let idx=0, tn="pr", md="flash", pIdx=0;

function up(){
    const v=verbs[idx];
    document.getElementById('fc-v').innerText=v.i; document.getElementById('fc-t').innerText=v.t;
    let h=""; v[tn].forEach((c,i)=>h+=`<div class="c-item"><b>${pron[i]}</b> ${c}</div>`);
    document.getElementById('fc-c').innerHTML=h;
    if(md==='ex'){
        document.getElementById('ex-p').innerText=`${pron[pIdx]} (${v.i})`;
        document.getElementById('ex-f').innerText=""; document.getElementById('ex-in').value="";
    }
}
function setMode(m){
    md=m; document.getElementById('vFlash').style.display=m==='flash'?'block':'none';
    document.getElementById('vEx').style.display=m==='ex'?'block':'none';
    document.getElementById('bFlash').className=m==='flash'?'act':''; document.getElementById('bEx').className=m==='ex'?'act':'';
    up();
}
function chTense(){ tn=document.getElementById('tSelect').value; up(); }
function check(){
    const u=document.getElementById('ex-in').value.toLowerCase().trim();
    const c=verbs[idx][tn][pIdx]; const f=document.getElementById('ex-f');
    if(u===c){ f.innerText="Correto!"; f.style.color="green"; setTimeout(next,1000); }
    else{ f.innerText=`Incorreto. Resposta: ${c}`; f.style.color="red"; }
}
function next(){
    if(md==='ex'){ pIdx++; if(pIdx>=5){pIdx=0;idx++;} }else{ idx++; }
    if(idx>=verbs.length)idx=0; up();
}
function prev(){
    idx--; if(idx<0)idx=verbs.length-1; pIdx=0; up();
}
function shuffle(){
    verbs.sort(() => Math.random() - 0.5);
    idx = 0;
    pIdx = 0;
    up();
}
up();
</script>
</body>
</html>
